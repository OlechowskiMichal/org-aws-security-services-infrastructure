pre-commit:
  commands:
    mod-tidy:
      glob: "**/*.go"
      run: task lint:go:mod-tidy
      fail_text: "go mod tidy made changes"

    fmt:
      glob: "**/*.go"
      run: task lint:go:fmt
      fail_text: "gofmt found unformatted files"

    vet:
      glob: "**/*.go"
      run: task lint:go:vet
      fail_text: "go vet found issues"

    lint:
      glob: "**/*.go"
      run: task lint:go:new
      fail_text: "golangci-lint found issues"

    file-length:
      glob: "**/*.go"
      shell: bash
      run: |
        MAX_LINES=120
        VIOLATIONS=""
        for f in {staged_files}; do
          case "$f" in *_test.go|*/mocks/*) continue;; esac
          lines=$(wc -l < "$f" 2>/dev/null || echo 0)
          if [ "$lines" -gt "$MAX_LINES" ]; then
            VIOLATIONS="${VIOLATIONS}${f}: ${lines} lines (max ${MAX_LINES})\n"
          fi
        done
        if [ -n "$VIOLATIONS" ]; then
          printf '%b' "$VIOLATIONS"
          exit 1
        fi
      fail_text: "source files must be ≤120 lines (tests excluded)"

    security:
      glob: "**/*.go"
      run: task lint:go:security
      fail_text: "gosec found security issues"

    test:
      glob: "**/*.go"
      run: task lint:go:test
      fail_text: "tests failed"

pre-push:
  commands:
    full-lint:
      run: task lint:go
      fail_text: "full lint failed"

    vulncheck:
      run: task lint:go:vulncheck
      fail_text: "known vulnerabilities found"
