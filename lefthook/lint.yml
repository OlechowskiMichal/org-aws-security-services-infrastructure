pre-commit:
  parallel: true
  commands:
    actionlint:
      glob: ".github/workflows/*.{yaml,yml}"
      run: task lint:actionlint
      fail_text: "actionlint found issues"

    yamllint:
      glob: "**/*.{yaml,yml}"
      run: task lint:yamllint
      fail_text: "yamllint found issues"

    markdownlint:
      glob: "**/*.md"
      run: task lint:markdownlint
      fail_text: "markdownlint found issues"
