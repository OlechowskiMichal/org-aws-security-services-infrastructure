pre-commit:
  parallel: true
  commands:
    tofu-fmt:
      glob: "**/*.tf"
      run: task tofu:fmt:check
      fail_text: "tofu fmt found unformatted files"

    tflint:
      glob: "**/*.tf"
      run: task tofu:tflint
      fail_text: "tflint found issues"

    trivy:
      glob: "**/*.tf"
      run: task tofu:trivy
      fail_text: "trivy found security issues in OpenTofu configuration"
